spring:
  application:
    name: ramsai-kitchen
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ramsai_kitchen}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.ramsai.kitchen: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
