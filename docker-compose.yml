version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ramsai-kitchen-db
    environment:
      POSTGRES_USER: ramsai
      POSTGRES_PASSWORD: kitchen_password
      POSTGRES_DB: ramsai_kitchen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ramsai -d ramsai_kitchen"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ramsai-kitchen-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ramsai_kitchen
      - SPRING_DATASOURCE_USERNAME=ramsai
      - SPRING_DATASOURCE_PASSWORD=kitchen_password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
